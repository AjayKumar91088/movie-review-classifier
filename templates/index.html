<!DOCTYPE html>
<html>

<head>
<title>Movie Review Classifier</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#f2f2f2;
}

textarea{
width:400px;
height:120px;
font-size:16px;
padding:10px;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

#result{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<h1>🎬 Movie Review Classifier</h1>

<p>Enter a movie review:</p>

<textarea id="review"></textarea>

<br>

<button onclick="predict()">Predict</button>

<div id="result"></div>

<script>

function predict(){

let review = document.getElementById("review").value;

let resultDiv = document.getElementById("result");

resultDiv.innerHTML = "Analyzing review... ⏳";

fetch("/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({text:review})

})

.then(response=>response.json())

.then(data=>{

if(data.prediction.includes("Blockbuster")){
resultDiv.style.color="green";
}
else{
resultDiv.style.color="red";
}

resultDiv.innerHTML =
data.prediction +
"<br>Confidence: "+data.confidence+"%";

});

}

</script>

</body>

</html>
